# Auto-generated nginx config for consolidated static sites
# Each site clones from its GitHub repo on container start

server {
    listen 80 default_server;
    server_name _;
    return 404;
}

# lockshiftprous.com
server {
    listen 80;
    server_name lockshiftprous.com www.lockshiftprous.com;
    root /usr/share/nginx/html/lockshiftprous.com;
    index index.html index.htm;
    location / { try_files $uri $uri/ =404; }
}

