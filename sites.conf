server { listen 80 default_server; server_name _; return 200 "Static Site Hub\n"; }

server {
    listen 80;
    server_name lockshiftprous.com www.lockshiftprous.com;
    root /usr/share/nginx/html/lockshiftprous.com;
    index index.html index.htm;
    location / { try_files $uri $uri/ =404; }
}

